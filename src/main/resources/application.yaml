spring:
  application:
    name: transaction-aggregation-api
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

    jpa:
      hibernate:
        ddl-auto: update
      show-sql: true

    h2:
      console:
        enabled: true
  spring:
    jackson:
      serialization:
        write-dates-as-timestamps: false
      date-format: yyyy-MM-dd